                 C 75,10 95,25 90,45 
                 C 95,60 90,75 75,85 
                 C 65,90 55,90 50,85" />

        <!-- Brain Stem -->
        <path fill="#EFF6FF" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" 
              d="M 45,86 L 45,95 C 45,100 55,100 55,95 L 55,86 Z" />

        <!-- Interior Brain Folds - Left -->
        <path fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" d="M 25,35 C 35,30 40,40 48,35" />
        <path fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" d="M 15,55 C 25,50 35,60 43,55" />
        <path fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" d="M 25,75 C 35,70 40,80 48,75" />

        <!-- Interior Brain Folds - Right -->
        <path fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" d="M 75,35 C 65,30 60,40 52,35" />
        <path fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" d="M 85,55 C 75,50 65,60 57,55" />
        <path fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" d="M 75,75 C 65,70 60,80 52,75" />

        <!-- Center Divider (Flow) -->
        <path fill="none" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" stroke-dasharray="0.1,7" d="M 50,24 L 50,42" />
        <path fill="none" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" stroke-dasharray="0.1,7" d="M 50,68 L 50,83" />

