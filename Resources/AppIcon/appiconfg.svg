        <path fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" 
              d="M 30,55 C 30,42 45,42 50,55 C 55,68 70,68 70,55 C 70,42 55,42 50,55 C 45,68 30,68 30,55 Z" />

        <!-- Flow Nodes -->
        <circle cx="30" cy="55" r="4.5" fill="#1D4ED8" />
        <circle cx="70" cy="55" r="4.5" fill="#1D4ED8" />
        <circle cx="50" cy="55" r="6" fill="#1E3A8A" />
        <circle cx="50" cy="55" r="2.5" fill="#60A5FA" />
        <circle cx="30" cy="55" r="1.5" fill="#60A5FA" />
        <circle cx="70" cy="55" r="1.5" fill="#60A5FA" />
